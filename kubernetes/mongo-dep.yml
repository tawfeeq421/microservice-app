apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-app
  labels:
    app: my-mango
    auther: Tawfeeq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-app
  template:
    metadata:
      labels:
        app: mongo-app
    spec:
      containers:
        - name: mongo
          image: mongo
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: epoc

