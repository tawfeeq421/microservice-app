apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapi
  labels:
    app: nodeapi-app
    author: tawfeeq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodeapi
  template:
    metadata:
      labels:
        app: nodeapi
    spec:
      containers:
        - name: nodeapi
          image: tawfeeq421/emartapp-api
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_HOST
              value: mongo-service
