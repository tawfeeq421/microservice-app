apiVersion: apps/v1
kind: Deployment
metadata:
  name: javaapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: javaapi
  template:
    metadata:
      labels:
        app: javaapi
    spec:
      containers:
        - name: javaapi
          image: tawfeeq421/emartapp-webapi
          ports:
            - containerPort: 9000
          env:
            - name: DB_HOST
              value: emart-service
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: books
            - name: DB_PASSWORD
              value: emartdbpass
