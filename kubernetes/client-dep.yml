apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  labels:
    app: client-app
    auther: tawfeeq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        -  name: client
           image: tawfeeq421/emartapp-client 
           ports:
             - containerPort: 4200
